# Production releases follow the fleet convention keel set: non-prod ships
# on merge to main (CI gates it), prod ships on a version tag. Tagging
# vX.Y.Z re-runs the full CI (including the scaffolded-app build), checks
# the tag against package.json, and cuts a GitHub Release — the ref
# `npx github:Gambi97/pier#vX.Y.Z` pins. npm publish (with provenance)
# activates itself only once an NPM_TOKEN secret exists.
name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read

jobs:
  verify:
    uses: ./.github/workflows/ci.yml

  release:
    name: GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      id-token: write # npm provenance attestation
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - name: Tag must match package.json
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag v${tag} does not match package.json version ${pkg}"
            exit 1
          fi
      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
      - name: Publish to npm (no-op until NPM_TOKEN is configured)
        if: env.NPM_TOKEN != ''
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
